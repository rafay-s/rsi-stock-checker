<!DOCTYPE html>
<html>
<head>
    <title>RSI Checker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            max-width: 600px;
            margin: 80px auto;
            padding: 0 20px;
        }
        input {
            padding: 8px;
            font-size: 16px;
        }
        button {
            padding: 8px 16px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>Stock RSI Checker</h1>
    <p>Enter any stock ticker to check its current RSI (Relative Strength Index) and see whether it's overbought, oversold, or neutral.</p>

    <form method="POST">
        <input type="text" name="ticker" placeholder="e.g. AAPL" required>
        <button type="submit">Check RSI</button>
    </form>

    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}

    {% if result %}
        <h2>{{ result.ticker }}</h2>
        <p>RSI: {{ result.rsi }}</p>
        <p>{{ result.status }}</p>
    {% endif %}

</body>
</html>
